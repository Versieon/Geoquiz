<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital City Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-container">
        <h1>World Capital Quiz</h1>
        <p>Select a Grouping:</p>
        <button class="grouping-btn" data-grouping="usstates">US State Capitals</button>
        <button class="grouping-btn" data-grouping="europe">European Capitals</button>
        <button class="grouping-btn" data-grouping="all">World Capitals</button>
        <hr>
        <div id="rounds-selection" style="display: none;">
            <p>Select the number of rounds to play:</p>
            <button class="round-btn" data-rounds="5">5 Rounds</button>
            <button class="round-btn" data-rounds="10">10 Rounds</button>
            <button class="round-btn" data-rounds="15">15 Rounds</button>
            <button class="round-btn" data-rounds="endless">Endless</button>
            <button id="start-game-btn" disabled>Start Game</button>
        </div>
    </div>

    <div id="map" style="display: none;"></div>

    <div id="ui-container" style="display: none;">
        <div id="score-tracker">Round: <span id="current-round">0</span> / <span id="total-rounds">0</span> | Score: <span id="total-score">0</span></div>
        <h2 id="question"></h2>
        <div id="result"></div>
        <div id="action-buttons">
            <button id="next-round-btn" style="display: none;">Next Round</button>
            <button id="quit-game-btn" style="display: none;">Quit Game</button>
        </div>
    </div>

    <div id="game-over-container" style="display: none;">
        <h2>Game Over!</h2>
        <p>Your final score is <b id="final-score">0</b> out of <b id="max-possible-score">0</b>.</p>
        <button id="play-again-btn">Play Again</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
